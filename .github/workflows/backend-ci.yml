name: Backend CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      coverage_threshold:
        description: "Coverage fail-under threshold (default: 80)"
        required: false
        default: "80"
      run_lint:
        description: "Run lint job (true/false)"
        required: false
        default: "true"
      run_tests:
        description: "Run test job (true/false)"
        required: false
        default: "true"
      run_coverage:
        description: "Run coverage job (true/false)"
        required: false
        default: "true"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: ${{ (github.event_name != 'workflow_dispatch' && vars.ENABLE_LINT != 'false') || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_lint != 'false') }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check app tests

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    if: ${{ ((github.event_name != 'workflow_dispatch' && vars.ENABLE_TESTS != 'false') || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_tests != 'false')) && (needs.lint.result == 'success' || needs.lint.result == 'skipped') }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unittest
        run: python -m unittest discover -s tests -p 'test_*.py' -v

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    if: ${{ ((github.event_name != 'workflow_dispatch' && vars.ENABLE_COVERAGE != 'false') || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_coverage != 'false')) && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    defaults:
      run:
        working-directory: backend
    env:
      COVERAGE_THRESHOLD: ${{ vars.COVERAGE_THRESHOLD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run coverage
        run: |
          INPUT_THRESHOLD='${{ github.event.inputs.coverage_threshold }}'
          if [ -n "$INPUT_THRESHOLD" ]; then
            THRESHOLD="$INPUT_THRESHOLD"
          elif [ -n "$COVERAGE_THRESHOLD" ]; then
            THRESHOLD="$COVERAGE_THRESHOLD"
          else
            THRESHOLD="80"
          fi

          echo "Using coverage threshold: $THRESHOLD"
          coverage run -m unittest discover -s tests -p 'test_*.py'
          coverage report -m --fail-under="$THRESHOLD"
          coverage xml -o coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml
