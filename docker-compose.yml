services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: samba-admin-backend
    env_file:
      # Backend app env file path configurable via BACKEND_ENV_FILE in docker/compose.env.
      - "${BACKEND_ENV_FILE:-docker/backend.env}"
    ports:
      # Host port is configurable via BACKEND_PORT in docker/compose.env (default: 8000).
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # Backend persistent data path configurable via BACKEND_DATA_PATH in docker/compose.env.
      - "${BACKEND_DATA_PATH:-./data}:/app/backend/app/data"
    restart: unless-stopped

    # CPU limit for backend container.
    # Examples: "0.50" = half core, "1.00" = one core, "2.00" = two cores.
    cpus: "${BACKEND_CPUS:-1.00}"

    # Hard memory limit for backend container.
    # Increase if backend workloads need more RAM.
    mem_limit: "${BACKEND_MEM_LIMIT:-1g}"

    # Soft memory reservation (best-effort target under pressure).
    # Keep this lower than mem_limit.
    mem_reservation: "${BACKEND_MEM_RESERVATION:-512m}"

    # Container log rotation (prevent unbounded json-file growth).
    logging:
      driver: json-file
      options:
        # Max size per log file before rotation.
        max-size: "${BACKEND_LOG_MAX_SIZE:-10m}"
        # Max number of rotated log files to keep.
        max-file: "${BACKEND_LOG_MAX_FILE:-3}"

    # Backend health endpoint check used by frontend dependency condition.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      # Healthcheck timing can be tuned in docker/compose.env.
      interval: "${BACKEND_HEALTH_INTERVAL:-3s}"
      timeout: "${BACKEND_HEALTH_TIMEOUT:-3s}"
      retries: ${BACKEND_HEALTH_RETRIES:-5}
      start_period: "${BACKEND_HEALTH_START_PERIOD:-3s}"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: samba-admin-frontend
    depends_on:
      # Fast-start mode: only require backend container to be started.
      # Healthcheck is kept for runtime monitoring/troubleshooting.
      backend:
        condition: service_started
    ports:
      # Host port is configurable via FRONTEND_PORT in docker/compose.env (default: 5173).
      - "${FRONTEND_PORT:-5173}:80"
    restart: unless-stopped

    # CPU limit for frontend (nginx) container.
    cpus: "${FRONTEND_CPUS:-0.50}"

    # Hard memory limit for frontend container.
    mem_limit: "${FRONTEND_MEM_LIMIT:-512m}"

    # Soft memory reservation for frontend container.
    mem_reservation: "${FRONTEND_MEM_RESERVATION:-256m}"

    # Container log rotation (prevent unbounded json-file growth).
    logging:
      driver: json-file
      options:
        # Max size per log file before rotation.
        max-size: "${FRONTEND_LOG_MAX_SIZE:-10m}"
        # Max number of rotated log files to keep.
        max-file: "${FRONTEND_LOG_MAX_FILE:-3}"
